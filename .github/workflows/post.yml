name: Auto Post Instagram Reel

on:
  schedule:
    # 7:00 AM IST → 01:30 UTC
    - cron: '30 1 * * *'
    
    # 5:30 PM IST → 12:00 UTC
    - cron: '0 12 * * *'

  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED to push CSV changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # important for push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python Dependencies
        run: |
          pip install pandas moviepy pillow requests cloudinary

      - name: Run Script
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python video_post_runner.py

      # 🔥 IMPORTANT: Commit updated CSV
      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add quotes.csv
          git commit -m "Auto update posted status" || echo "No changes to commit"
          git push
