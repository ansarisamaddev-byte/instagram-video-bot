name: Caption Post Instagram Reel

on:
  schedule:
    # 8:00 AM IST → 02:30 UTC
    - cron: '30 2 * * *'
    # 9:00 PM IST → 15:30 UTC
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas moviepy pillow requests cloudinary faster-whisper numpy

      - name: Run Script
        env:
          IG_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python insta_caption_post_runner.py

      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Save changes
          git stash

          # Pull latest
          git pull origin main --rebase

          # Re-apply changes
          git stash pop || echo "No changes to pop"

          # Commit if changes exist
          git add database.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update posted status"

          git push origin main
