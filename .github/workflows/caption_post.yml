name: YouTube Automation

on:
  schedule:
    # 7:15 AM IST → 01:45 UTC
    - cron: '45 1 * * *'
    # 7:30 PM IST → 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas \
          google-api-python-client \
          google-auth \
          google-auth-oauthlib \
          cloudinary \
          moviepy \
          pillow \
          numpy \
          faster-whisper

      - name: Run YouTube Automation
        env:
          CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python youtube_automation.py

      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Save local changes
          git stash

          # Pull latest changes safely
          git pull origin main --rebase

          # Re-apply local changes
          git stash pop || echo "No changes to pop"

          # Commit updated CSV
          git add yt_database.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update YouTube posted status"
          
          git push origin main
